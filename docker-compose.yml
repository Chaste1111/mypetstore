services:
  # ============ MySQL 数据库 ============
  mysql:
    image: mysql:8.4
    container_name: petstore-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: mypetstore
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database_check.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ Spring Boot 后端 ============
  backend:
    build: .
    container_name: petstore-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/mypetstore?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    ports:
      - "8080:8080"

  # ============ Nginx 前端 + 反向代理 ============
  nginx:
    image: nginx:1.27-alpine
    container_name: petstore-nginx
    depends_on:
      backend:
        condition: service_started
    restart: on-failure
    ports:
      - "9090:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql_data:
